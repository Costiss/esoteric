version: "3.8"

services:
  mobile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esotheric-mobile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      NODE_ENV: development
      # Connect to backend in host or via docker network
      API_URL: http://localhost:3000
      # For iOS simulator, you may need this
      EXPO_TUNNEL: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true
    extra_hosts:
      # Required for Android emulator to access host
      - "host.docker.internal:host-gateway"

volumes:
  node_modules:

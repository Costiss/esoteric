version: "3.8"

services:
  # Database services
  db:
    image: postgres:16-bookworm
    container_name: esotheric-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esotheric
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0-bookworm
    container_name: esotheric-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: esotheric-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/esotheric
      VALKEY_URL: redis://valkey:6379
      RUST_LOG: debug
      RUST_ENV: development
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64:-}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - cargo-cache:/root/.cargo
    stdin_open: true
    tty: true

  # Mobile service (Expo)
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: esotheric-mobile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      NODE_ENV: development
      API_URL: http://localhost:3000
      EXPO_TUNNEL: "true"
    volumes:
      - ./mobile:/app
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  valkey_data:
  cargo-cache:
  node_modules:
